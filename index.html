<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Carousel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="carousel-wrapper">

    <div class="carousel-container">

        <button class="nav-btn prev">&#10094;</button>

        <div class="carousel-view">
            <div class="carousel-track">

                <img src="images/image1.png" class="slide">
                <img src="images/image2.png" class="slide">
                <img src="images/image3.png" class="slide">
                <img src="images/image4.png" class="slide">
                <img src="images/image5.png" class="slide">
                <img src="images/image6.png" class="slide">
                <img src="images/image7.png" class="slide">
                <img src="images/image8.png" class="slide">
                <img src="images/image9.png" class="slide">
                <img src="images/image10.png" class="slide">
                <img src="images/image11.png" class="slide">
                <img src="images/image12.png" class="slide">
                <img src="images/image13.png" class="slide">
                <img src="images/image14.png" class="slide">
                <img src="images/image15.png" class="slide">
                <img src="images/image16.png" class="slide">
                <img src="images/image17.png" class="slide">

            </div>
        </div>

        <button class="nav-btn next">&#10095;</button>

    </div>

    <div class="controls">
        <div class="dots"></div>


    </div>

</div>

<script src="script.js"></script>

    <!-- Fullscreen Viewer -->
<div class="fullscreen" id="fullscreen">
    <button class="fullscreen-close">&times;</button>

    <button class="fullscreen-nav fullscreen-prev">
        &#10094;
    </button>

    <img class="fullscreen-image" id="fullscreenImage">

    <button class="fullscreen-nav fullscreen-next">
        &#10095;
    </button>
</div>
    
</body>
</html>
